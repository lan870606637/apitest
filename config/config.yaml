# 亿驾 v3.0 客户端接口 - 环境配置
environments:
  dev:
    base_url: "http://api.carbit.com.cn"
    api_version: "v3.0"
    timeout: 15
    retry_count: 2
  qa:
    base_url: "http://qa-api.carbit.com.cn"
    api_version: "v3.0"
    timeout: 15
    retry_count: 3
  prod:
    base_url: "https://api.carbit.com.cn"
    api_version: "v3.0"
    timeout: 20
    retry_count: 3

# 当前使用的环境（可通过环境变量 ENV 覆盖）
current_env: dev

# 签名相关
sign:
  app_key: "abc123"

# 设备 IMEI（用于签名计算）
# 必须与 X-DEVICE 加密前的 IMEI 一致
device_imei: "66481fd0-f2c0-43d1-9090-af8cfd32c4b9"

# X-DEVICE 加密后的密文（由 PHP 加密工具生成）
x_device_encrypted: "uFOcTM5c96aNZ6QmUi0Y4i4C46Oi5Nmm5/w3FdBEUd4CWMQpW/XB5lOiZYG+9umL"

# X-CLIENT 加密后的密文（由 PHP 加密工具生成）
x_client_encrypted: "uFOEWM2DWMPne/+oTMZNUTO84zw84M0duM21T=p8W/0kTM08F=+nJz9kWMENFNOM4zOd6Mx8e/+oTMZNUTGpF6485FGK9uXn0u2cT/+hW/xB4kGsUi4dFNONJMnK4nx8JMvN4zGNUTGpZdBEZlQmW6BNFNOi6Y08T=5K96aN5NOx"

# 终端类型
biz: "android"

# 日志配置
logging:
  level: DEBUG
  format: "%(asctime)s [%(levelname)s] %(name)s - %(message)s"
  file: "reports/test.log"
