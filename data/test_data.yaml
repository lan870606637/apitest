      actions:
        - field_name: "nick_name"
          val: "autotest_multi"
        - field_name: "gender"
          val: "男"
        - field_name: "my_car"
          val: "4#69#3560"
    need_token: true
    expect_code: 0

  - case_id: "EDIT_005"
    title: "编辑不存在的字段名"
    context:
      actions:
        - field_name: "not_exist_field"
          val: "xxx"
    need_token: true
    # 期望 3012(编辑的列名不正确) 或 0(服务端忽略未知字段)
    expect_code_in: [0, 3012]

