[pytest]
testpaths = testcases
markers =
    smoke: 冒烟测试
    regression: 回归测试
    user: 用户模块
    login: 登录模块
    update: 检查更新模块
    feedback: 意见反馈模块
    sms: 短信模块
    data_driven: 数据驱动模式（YAML + parametrize）
    plain: 裸写模式（用例硬编码，无数据驱动抽象）
addopts = -v --tb=short --strict-markers --capture=no

# 日志输出配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
